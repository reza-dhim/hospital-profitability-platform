name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs exist
        run: |
          test -f AGENTS.md
          test -f docs/PRODUCT_BIBLE.md
          test -f docs/PRD.md
